<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@400;500;600&family=Merriweather:ital,wght@0,400;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body{margin:0;overflow:hidden;user-select:none;}
    *{box-sizing:border-box;}
    input[type="range"]{-webkit-appearance:none;background:transparent;width:100%;height:24px;cursor:pointer;}
    input[type="range"]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;background:#8cf0a8;cursor:pointer;margin-top:-5px;border:2px solid #1a1d23;}
    input[type="range"]::-webkit-slider-runnable-track{height:5px;border-radius:3px;background:rgba(140,240,168,0.15);}
    ::selection{background:rgba(140,240,168,0.3);}
    @keyframes panelSlideIn{from{opacity:0;transform:translateX(-28px);}to{opacity:1;transform:translateX(0);}}
    @keyframes exportPopIn{from{opacity:0;transform:translate(-50%,-46%) scale(0.96);}to{opacity:1;transform:translate(-50%,-50%) scale(1);}}
    @keyframes backdropFadeIn{from{opacity:0;}to{opacity:1;}}
    textarea,input[type="text"],input[type="number"],select{outline:none;font-family:'Space Grotesk',sans-serif;}
    select option{background:#252830;color:#e4e6ea;}
    ::-webkit-scrollbar{width:6px;height:6px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(140,240,168,0.18);border-radius:3px;}
  </style>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }

</style>
