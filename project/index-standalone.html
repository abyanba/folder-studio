  _getSnapshot(){const s=this.state;return JSON.parse(JSON.stringify({colorMode:s.colorMode,hue:s.hue,sat:s.sat,bri:s.bri,gradStops:s.gradStops,gradType:s.gradType,gradAngle:s.gradAngle,elements:s.elements,baseShape:s.baseShape,texture:s.texture,textureOpacity:s.textureOpacity,textureScale:s.textureScale,textureColor:s.textureColor,iconStroke:s.iconStroke,iconColor:s.iconColor}))}
  _pushHistory(){

  }
  _undo(){
    const cur=this._getSnapshot();const top=this._history[this._historyIdx];

    if(this._historyIdx<=0)return;

  }
  _redo(){

    this._historyIdx++;const snap=JSON.parse(JSON.stringify(this._history[this._historyIdx]));
    this._restoring=true;
    this.setState({...snap,nextId:Math.max(this.state.nextId,...(snap.elements||[]).map(e=>e.id+1),1),selectedId:null,editingTextId:null},()=>{this._restoring=false});
  }
