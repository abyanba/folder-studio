    };

  hsv2rgb(h,s,v){const c=v*s,x=c*(1-Math.abs((h/60)%2-1)),m=v-c;let r=0,g=0,b=0;if(h<60){r=c;g=x}else if(h<120){r=x;g=c}else if(h<180){g=c;b=x}else if(h<240){g=x;b=c}else if(h<300){r=x;b=c}else{r=c;b=x}return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)]}
  rgb2hex(r,g,b){return'#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}
  hex2hsv(hex){if(!hex||hex.length<7)return[0,0,0];const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255,mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn;let h=0;if(d>0){if(mx===r)h=((g-b)/d+6)%6*60;else if(mx===g)h=((b-r)/d+2)*60;else h=((r-g)/d+4)*60}return[h,mx>0?d/mx:0,mx]}
  getHex(h,s,v){const[r,g,b]=this.hsv2rgb(h,s,v);return this.rgb2hex(r,g,b)}

  }

  addImage(src,w,ht){

    const x=(CDW-w)/2,y=(CDH-ht)/2,ex=this.state.elements.find(e=>e.type==='image');

  }

  autoFitSize(id){const el=this.state.elements.find(e=>e.id===id);if(!el||el.type!=='text')return;const cv=document.createElement('canvas');const ctx=cv.getContext('2d');let lo=4,hi=96,best=el.fontSize;const ls=el.letterSpacing||0;while(lo<=hi){const mid=Math.floor((lo+hi)/2);ctx.font=`${el.fontStyle==='italic'?'italic ':''}${el.fontWeight} ${mid}px "${el.fontFamily}"`;const tw=ctx.measureText(el.text).width+(el.text.length>1?(el.text.length-1)*ls:0);const th=mid*(el.lineHeight||1.3);if(tw<=el.width&&th<=el.height){best=mid;lo=mid+1}else{hi=mid-1}}this.updateEl(id,{fontSize:best})}
  autoFitSpacing(id){const el=this.state.elements.find(e=>e.id===id);if(!el||el.type!=='text'||el.text.length<=1)return;const cv=document.createElement('canvas');const ctx=cv.getContext('2d');ctx.font=`${el.fontStyle==='italic'?'italic ':''}${el.fontWeight} ${el.fontSize}px "${el.fontFamily}"`;const tw=ctx.measureText(el.text).width;const remaining=el.width-tw;const spacing=Math.round(remaining/(el.text.length-1)*2)/2;this.updateEl(id,{letterSpacing:Math.max(-2,Math.min(20,spacing))})}

  startMove(e,id){e.stopPropagation();e.preventDefault();const el=this.state.elements.find(x=>x.id===id);this.setState({selectedId:id,drag:{type:'move',sx:e.clientX,sy:e.clientY,el:{...el}},editingTextId:null})}

        backdrop,exportPanel,gallery)),
      fileInput);

    return{app};
  }
}
